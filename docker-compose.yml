# docker compose up --build
# podman compose up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: api_trainer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/api_trainer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cargo-cache:/root/.cargo/registry
      - build-cache:/tmp/api-trainer-cache

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres-data:
  cargo-cache:
  build-cache:
