databases:
  - name: api-trainer-db
    plan: free
    databaseName: api_trainer
    user: api_trainer

services:
  - type: web
    name: api-trainer-server
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: api-trainer-db
          property: connectionString
    healthCheckPath: /health

  - type: web
    name: api-trainer-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
